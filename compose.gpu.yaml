# GPU override — layer ON TOP of compose.yaml to run on an NVIDIA GPU.
#
#   docker compose -f compose.yaml -f compose.gpu.yaml ... up
#
# This file ONLY adds two things to the `app` and `server` services:
#   1. image defaults to cc-pipeline:gpu (the cu130 build)
#   2. an NVIDIA GPU reservation so the container can see the card
#
# It changes nothing about the CPU path. To revert to CPU, simply stop
# passing `-f compose.gpu.yaml` — the base compose.yaml is CPU-only and
# untouched.
#
# Prerequisites on the host (WSL):
#   - NVIDIA driver installed on Windows + WSL2 CUDA support
#   - NVIDIA Container Toolkit installed in the WSL distro
#   - Verify: docker run --rm --gpus all nvidia/cuda:12.4.0-base nvidia-smi
#
# The pipeline auto-detects the GPU (device="auto" → cuda) and switches to
# fp16 on its own — no app config change needed once the card is visible.

services:
  app:
    image: ${IMAGE:-cc-pipeline:gpu}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  server:
    image: ${IMAGE:-cc-pipeline:gpu}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
