# Dev (WSL) compose — test the image against your EXISTING local models and
# Hugging Face cache. No model staging, no offline mode, no prod ceremony.
#
# For production deployment use compose.yaml + docs/runbooks/deployment.md.
#
# Usage:
#   cp deploy/env.dev.example .env.dev      # then set GEMINI_API_KEY
#   docker compose -f compose.dev.yaml up -d db
#   docker compose -f compose.dev.yaml run --rm app --limit 3 --batch-name dev-test
#
# The image ships CPU torch, so this runs on CPU even on a GPU box — that's
# fine for verifying the image; it's the same artifact that ships to prod.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cc_pipeline
      POSTGRES_PASSWORD: devlocal
      POSTGRES_DB: call_center
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      # Reachable from the WSL host (e.g. DBeaver) at localhost:5432
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cc_pipeline -d call_center"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: cc-pipeline:local
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.dev
    environment:
      STORAGE_ENABLE: "1"
      DATABASE_URL: postgresql://cc_pipeline:devlocal@db:5432/call_center
    extra_hosts:
      # Lets the container reach a vLLM server running on the WSL host.
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data                       # audio in/out, results, archive
      - ./models:/models                       # your existing LoRA adapter
      - ${HOME}/.cache/huggingface:/hf         # your existing Whisper download
    command: ["--workers", "2"]

volumes:
  pgdata_dev:
