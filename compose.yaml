# Single compose file — works for both dev (WSL) and prod (RHEL).
#
# Topology: postgres + app. Everything that differs between environments
# (image tag, paths, credentials, offline flags) is read from `.env`.
#
# Typical commands (via Makefile):
#   make up      # docker compose --env-file .env up -d db
#   make smoke   # docker compose --env-file .env run --rm app --limit 3 ...
#   make psql    # docker compose --env-file .env exec db psql -U ...
#   make down    # docker compose --env-file .env down
#
# Prod-specific notes (RHEL with SELinux):
#   - Append `:Z` to each volume mount (`./data:/app/data` → `./data:/app/data:Z`)
#     so Docker relabels the host directory for SELinux.
#   - Set absolute paths in `.env`: DATA_DIR, ADAPTERS_DIR, HF_CACHE_DIR.
#   - Set HF_HUB_OFFLINE=1 and TRANSFORMERS_OFFLINE=1 in `.env`.

services:
  # -------------------------------------------------------------------------
  # PostgreSQL — analytics + idempotency
  # -------------------------------------------------------------------------
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cc_pipeline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-call_center}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Reachable from the host on 5432 for DBeaver/psql. Comment out in
      # prod if you don't want the port exposed beyond the compose network.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-cc_pipeline} -d $${POSTGRES_DB:-call_center}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -------------------------------------------------------------------------
  # Application — one-shot batch runner
  # -------------------------------------------------------------------------
  app:
    image: ${IMAGE:-cc-pipeline:cpu}
    depends_on:
      db:
        condition: service_healthy
    # Pipeline-level configuration: read from .env, passed to the container.
    env_file:
      - .env
    # Compose-level overrides for things only meaningful inside the network.
    environment:
      STORAGE_ENABLE: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER:-cc_pipeline}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-call_center}
    extra_hosts:
      # Lets the container reach a service on the host machine (e.g. vLLM
      # at http://host.docker.internal:8080). Harmless in prod when unused.
      - "host.docker.internal:host-gateway"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${ADAPTERS_DIR:-./models}:/adapters
      - ${HF_CACHE_DIR:-${HOME}/.cache/huggingface}:/hf
    # Default args. Override with `make run ARGS="--workers 4 --batch-name X"`.
    command: ["--workers", "2"]

volumes:
  pgdata:
